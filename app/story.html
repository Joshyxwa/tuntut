<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuntut — what we found</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/story.css">
</head>
<body>

<header class="topbar" id="topbar"></header>

<main class="story">
  <div class="story-inner">
    <div class="dots" id="dots"></div>
    <div id="slide"></div>
    <div class="nav">
      <button class="back" id="back" aria-label="Previous">←</button>
      <button class="btn btn-primary" id="next">Next →</button>
    </div>
    <p class="hint">Use ← → arrow keys</p>
  </div>
</main>

<dialog class="sheet" id="signup" aria-labelledby="sheet-title">
  <div class="sheet-inner">
    <div class="idle">
      <h2 id="sheet-title"></h2>
      <p class="lead" id="sheet-lead"></p>
      <p class="mock" id="sheet-mock"></p>
      <div id="sheet-providers"></div>
      <button class="close" id="sheet-close" type="button">Not now</button>
      <div class="guard" id="sheet-guard"></div>
    </div>
    <div class="busy">
      <div class="spinner"></div>
      <p id="sheet-busy"></p>
    </div>
  </div>
</dialog>

<script src="data/tuntut-data.js" defer></script>
<script src="assets/app.js" defer></script>
<script src="assets/story.js" defer></script>
</body>
</html>
